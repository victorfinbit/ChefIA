  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // API llamada a través de Netlify Function (la key vive segura en Netlify)

    const PROMPT_INGREDIENTES = `Eres ChefIA, un asistente de cocina amigable y paciente para personas que NO saben cocinar bien. Tu trabajo es:

1. Cuando el usuario diga qué ingredientes tiene, sugiérele 3-4 recetas simples que pueda hacer con esos ingredientes. Presenta las opciones numeradas con nombre y descripción breve.

2. Cuando el usuario elija una receta o pida instrucciones, da los pasos MUY detallados:
   - Lista de ingredientes con cantidades exactas
   - Pasos numerados, uno por uno, súper claros
   - Tiempos de cocción exactos
   - Tips de principiante (cómo saber si está listo, qué hacer si algo sale mal)
   - Emojis para hacerlo visual y amigable

3. Si te preguntan cosas de cocina básicas, explica de forma muy simple.

Responde siempre en español mexicano, de forma cálida y motivadora.`;

    const PROMPT_IDEAS = `Eres ChefIA, un asistente de cocina amigable para personas que no saben cocinar mucho.

Cuando el usuario pida ideas por categoría (desayuno, comida, cena, antojitos, postres, rápido), sugiere 4-5 opciones populares y fáciles con descripción breve y emojis.

Cuando elija una, da instrucciones paso a paso muy claras para principiantes.

Responde en español mexicano, cálido y motivador.`;

    const PROMPT_CHEF = `Eres ChefIA en modo Chef Premium 👨‍🍳⭐ — un chef profesional mexicano con técnica culinaria de alto nivel.

Cuando el usuario pida una receta (chimichurri, enchiladas, mole, salsas, etc.) y especifique para cuántas personas, responde con:

1. 🍽️ **NOMBRE DEL PLATILLO** — descripción elegante y apetitosa

2. 👥 **PORCIONES:** [número que pidió]

3. 🛒 **INGREDIENTES** (calculados exactamente para las porciones pedidas):
   - Ingrediente: cantidad exacta
   - (lista completa con medidas precisas)

4. 💰 **COSTO ESTIMADO:**
   - Costo aproximado total en pesos mexicanos (MXN)
   - Costo por persona
   - (basa los precios en mercados y tianguis de México)

5. ⏱️ **TIEMPO:** Preparación + Cocción = Total

6. 👨‍🍳 **TÉCNICA CHEF — PASO A PASO:**
   - Pasos numerados con técnica profesional
   - Explica el POR QUÉ de cada técnica (ej. "sellamos la carne a fuego alto para crear la reacción de Maillard...")
   - Temperaturas exactas cuando aplique
   - Puntos clave de cocción
   - Tips de chef que marcan la diferencia

7. 🌟 **SECRETOS DEL CHEF:**
   - 2-3 trucos profesionales que elevan el platillo

8. 🍷 **MARIDAJE SUGERIDO:** qué acompaña perfecto

Sé conciso pero completo. Máximo 3 pasos en técnica, 2 secretos del chef. Usa emojis. Responde en español mexicano.`;

    const suggestedIngredients = [
      "Huevos","Pollo","Carne molida","Arroz","Frijoles","Tomate","Cebolla","Ajo",
      "Papa","Zanahoria","Pasta","Atún","Queso","Crema","Leche","Chile","Limón",
      "Cilantro","Aguacate","Tortillas"
    ];

    const mealCategories = [
      { id:"desayuno", label:"Desayuno", emoji:"🌅", color:"#F5A623", prompt:"Dame 5 ideas de desayunos fáciles y ricos para alguien que no sabe cocinar mucho." },
      { id:"comida",   label:"Comida",   emoji:"☀️", color:"#E8672A", prompt:"Dame 5 ideas de comidas (almuerzo) fáciles y ricas para principiantes." },
      { id:"cena",     label:"Cena",     emoji:"🌙", color:"#7B4FBF", prompt:"Dame 5 ideas de cenas fáciles, ricas y rápidas para principiantes." },
      { id:"antojitos",label:"Antojitos",emoji:"🌮", color:"#D63B2F", prompt:"Dame 5 ideas de antojitos mexicanos fáciles de preparar para principiantes." },
      { id:"postres",  label:"Postres",  emoji:"🍮", color:"#C0487A", prompt:"Dame 5 ideas de postres fáciles sin horno si es posible, para principiantes." },
      { id:"rapido",   label:"≤15 min",  emoji:"⚡", color:"#2E9E6B", prompt:"Dame 5 ideas de comidas que se hagan en máximo 15 minutos, fáciles para principiantes." },

    const chefSuggestions = [

      "Salsa verde tatemada","Salsa roja de molcajete","Guacamole clásico",
      "Caldo de pollo","Pozole rojo","Tamales de rajas","Chiles en nogada",
      "Cochinita pibil","Carnitas michoacanas","Birria de res","Barbacoa",
      "Ceviche de camarón","Aguachile","Tikin Xic","Sopa de lima",
      "Crema de elote","Sopa azteca","Arroz rojo mexicano","Frijoles charros",
    ];

    // ── COLORS & STYLES ──────────────────────────────────────────────────────────
    const colors = {

    };

    const s = {
      phoneFrame:{width:"min(390px, 100vw)",height:"min(844px, 100dvh)",background:colors.bg,borderRadius:"clamp(0px, 5vw, 50px)",overflow:"hidden",margin:"0 auto",boxShadow:"0 30px 80px rgba(0,0,0,0.35), 0 0 0 12px #1a1a1a, 0 0 0 14px #333",display:"flex",flexDirection:"column",fontFamily:"system-ui, sans-serif"},

      chipActive:{background:colors.accent,borderColor:colors.accent,color:"#FFF",fontWeight:"bold"},
      selectedWrap:{display:"flex",flexWrap:"wrap",gap:6},
      selectedChip:{display:"flex",alignItems:"center",gap:6,background:colors.surfaceAlt,border:`1.5px solid ${colors.primary}`,borderRadius:20,padding:"5px 10px 5px 12px"},
      selectedText:{fontSize:13,color:colors.primary,fontWeight:"600"},
      removeBtn:{background:"none",border:"none",color:colors.primary,fontSize:12,cursor:"pointer",padding:0},
      ctaBox:{padding:"8px 16px 20px",marginTop:"auto"},
      ctaBtn:{width:"100%",padding:"15px",borderRadius:28,background:`linear-gradient(135deg, ${colors.primary}, ${colors.primaryDark})`,color:"#FFF",fontSize:16,fontWeight:"bold",border:"none",cursor:"pointer",boxShadow:`0 6px 20px rgba(232,103,42,0.4)`},
      ctaChef:{background:`linear-gradient(135deg, #8B0000, #C4501F)`,boxShadow:"0 6px 20px rgba(139,0,0,0.4)"},

      hintText:{textAlign:"center",fontSize:12,color:colors.textLight,marginTop:8},
      catGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"4px 16px 12px"},

      catEmoji:{fontSize:34},
      catLabel:{fontSize:14,fontWeight:"bold",color:"#FFF"},
      infoBox:{margin:"4px 16px 20px",background:colors.surface,borderRadius:16,padding:"14px 16px",border:`1.5px dashed ${colors.border}`,textAlign:"center"},
      infoTitle:{margin:"0 0 4px",fontSize:14,fontWeight:"bold",color:colors.text},
      infoText:{margin:0,fontSize:12,color:colors.textMid,lineHeight:1.5},
      chefHero:{background:`linear-gradient(135deg, #1a0000, #8B0000, #C4501F)`,padding:"20px 20px 18px",position:"relative",overflow:"hidden",flexShrink:0},
      chefHeroOverlay:{position:"absolute",inset:0,background:"radial-gradient(ellipse at 80% 50%, rgba(255,200,100,0.15) 0%, transparent 70%)"},
      chefHeroContent:{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",gap:6},
      chefHeroEmoji:{fontSize:44,filter:"drop-shadow(0 4px 12px rgba(0,0,0,0.3))"},
      chefHeroTitle:{margin:0,fontSize:22,fontWeight:"bold",color:"#FFF",letterSpacing:1},
      chefHeroSub:{margin:0,fontSize:12,color:"rgba(255,255,255,0.8)",lineHeight:1.5},
      chefInput:{width:"100%",padding:"12px 16px",borderRadius:20,border:`2px solid ${colors.border}`,background:colors.surface,fontSize:14,color:colors.text,outline:"none",boxSizing:"border-box",marginBottom:12},
      suggRow:{display:"flex",alignItems:"center",gap:8,marginBottom:16},
      suggArrow:{width:32,height:32,borderRadius:16,background:colors.surface,border:`1.5px solid ${colors.border}`,color:colors.primary,fontSize:20,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"},
      suggCenter:{flex:1,display:"flex",flexDirection:"column",gap:6,alignItems:"center"},
      suggLabel:{margin:0,fontSize:11,color:colors.textLight},
      suggChip:{padding:"7px 14px",borderRadius:20,background:`linear-gradient(135deg, ${colors.primary}, ${colors.primaryDark})`,color:"#FFF",fontSize:13,fontWeight:"600",border:"none",cursor:"pointer",width:"100%"},
      suggChip2:{padding:"6px 14px",borderRadius:20,background:colors.surface,border:`1.5px solid ${colors.border}`,color:colors.textMid,fontSize:12,cursor:"pointer",width:"100%"},
      personsRow:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:6},
      personBtn:{padding:"8px 14px",borderRadius:16,background:colors.surface,border:`1.5px solid ${colors.border}`,fontSize:14,color:colors.textMid,cursor:"pointer",fontWeight:"500"},
      personBtnActive:{background:colors.primary,borderColor:colors.primary,color:"#FFF",fontWeight:"bold"},
      personsHint:{margin:"0 0 14px",fontSize:12,color:colors.textMid},
      badgeRow:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14},
      badge:{padding:"5px 10px",borderRadius:20,background:"#FFF3ED",border:`1px solid ${colors.border}`,fontSize:11,color:colors.textMid},
      chatScreen:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:colors.bg},
      chatHeader:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:colors.surface,borderBottom:"2px solid",flexShrink:0},
      backBtn:{background:"none",border:"none",color:colors.primary,fontSize:15,fontWeight:"bold",cursor:"pointer",padding:"4px 8px"},
      chatHeaderMid:{display:"flex",alignItems:"center",gap:10},
      chatAva:{width:36,height:36,borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18},
      chatName:{margin:0,fontSize:14,fontWeight:"bold",color:colors.text},
      chatSub:{margin:0,fontSize:11,color:colors.textLight},
      msgList:{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:12},
      userRow:{display:"flex",justifyContent:"flex-end"},
      aiRow:{display:"flex",alignItems:"flex-end",gap:8},
      aiAva:{width:28,height:28,borderRadius:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14},
      userBubble:{maxWidth:"78%",borderRadius:"20px 20px 6px 20px",padding:"11px 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"},
      aiBubble:{maxWidth:"80%",background:colors.aiMsg,borderRadius:"20px 20px 20px 6px",padding:"11px 14px",border:`1px solid ${colors.border}`,boxShadow:"0 2px 6px rgba(0,0,0,0.05)"},
      bubbleText:{margin:0,fontSize:13,lineHeight:1.65,color:colors.text,whiteSpace:"pre-wrap"},
      quickRow:{display:"flex",gap:6,padding:"8px 14px",overflowX:"auto",flexShrink:0,scrollbarWidth:"none"},
      quickReply:{padding:"6px 12px",borderRadius:20,background:colors.surface,border:"1.5px solid",fontSize:12,fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0},
      inputBar:{display:"flex",gap:8,padding:"10px 14px",background:colors.surface,borderTop:`1px solid ${colors.border}`,flexShrink:0,alignItems:"center"},
      chatInput:{flex:1,padding:"11px 16px",borderRadius:24,border:`2px solid ${colors.border}`,background:colors.bg,fontSize:14,color:colors.text,outline:"none"},
      sendBtn:{width:44,height:44,borderRadius:22,color:"#FFF",fontSize:18,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 3px 10px rgba(0,0,0,0.2)"},
    };

    // ── MAIN APP ──────────────────────────────────────────────────────────────────
    function ChefApp() {
      const [activeTab, setActiveTab] = useState("ingredientes");
      const [view, setView] = useState("home");
      const [chatMode, setChatMode] = useState("ingredientes");
      const [ingredients, setIngredients] = useState([]);
      const [ingInput, setIngInput] = useState("");
      const [chefDish, setChefDish] = useState("");
      const [chefPersons, setChefPersons] = useState("4");
      const [chefSuggIdx, setChefSuggIdx] = useState(0);
      const [messages, setMessages] = useState([]);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(false);
      const [chatTitle, setChatTitle] = useState("");
      const chatEndRef = useRef(null);

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

      const sendToAPI = async (convHistory, mode) => {
        setLoading(true);
        const systemMap = { ingredientes: PROMPT_INGREDIENTES, ideas: PROMPT_IDEAS, chef: PROMPT_CHEF };
        try {
          const res = await fetch("/.netlify/functions/chat", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-5",
              max_tokens: mode === "chef" ? 2000 : 1500,
              system: systemMap[mode] || PROMPT_INGREDIENTES,
              messages: convHistory,
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const text = data.content?.find(b=>b.type==="text")?.text || "Hubo un error, intenta de nuevo.";
          const msg = { role:"assistant", content:text };
          setMessages(prev=>[...prev, msg]);
          setHistory(prev=>[...prev, msg]);
        } catch(err) {
          setMessages(prev=>[...prev,{ role:"assistant", content:"❌ Error: " + (err.message || "Sin conexión. Revisa tu internet.") }]);
        }
        setLoading(false);
      };

      const openChat = async (firstMsg, title, mode) => {
        const entry = { role:"user", content:firstMsg };
        setChatMode(mode);
        setChatTitle(title);
        setMessages([entry]);
        const h = [entry];
        setHistory(h);
        setView("chat");
        await sendToAPI(h, mode);
      };

      const sendMessage = async (text) => {
        if (!text.trim() || loading) return;
        const entry = { role:"user", content:text };
        const newH = [...history, entry];
        setMessages(prev=>[...prev, entry]);
        setHistory(newH);
        await sendToAPI(newH, chatMode);
      };

      const resetApp = () => { setMessages([]); setHistory([]); setView("home"); };

      const addIng = (ing) => { if (!ingredients.includes(ing)) setIngredients([...ingredients, ing]); };
      const removeIng = (ing) => setIngredients(ingredients.filter(i=>i!==ing));
      const addCustomIng = () => {
        const v = ingInput.trim();
        if (v && !ingredients.includes(v)) { setIngredients([...ingredients, v]); setIngInput(""); }
      };

      // Live clock
      const [time, setTime] = useState(() => {
        const now = new Date();
        return `${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
      });
      useEffect(() => {
        const t = setInterval(() => {
          const now = new Date();
          setTime(`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`);
        }, 30000);
        return () => clearInterval(t);
      }, []);

      return (
        <div style={s.phoneFrame}>
          <div style={s.statusBar}>
            <span style={s.statusTime}>{time}</span>
            <span style={s.statusIcons}>●●● 📶 🔋</span>
          </div>

          {view === "home" ? (
            <HomeView
              activeTab={activeTab} setActiveTab={setActiveTab}
              ingredients={ingredients} ingInput={ingInput} setIngInput={setIngInput}
              addIng={addIng} removeIng={removeIng} addCustomIng={addCustomIng}
              openChat={openChat}
              chefDish={chefDish} setChefDish={setChefDish}
              chefPersons={chefPersons} setChefPersons={setChefPersons}
              chefSuggIdx={chefSuggIdx} setChefSuggIdx={setChefSuggIdx}
            />
          ) : (
            <ChatView
              messages={messages} loading={loading} onSend={sendMessage}
              onBack={resetApp} chatTitle={chatTitle} chatMode={chatMode}
              chatEndRef={chatEndRef}
            />
          )}
        </div>
      );
    }

    // ── HOME VIEW ─────────────────────────────────────────────────────────────────
    function HomeView({ activeTab, setActiveTab, ingredients, ingInput, setIngInput, addIng, removeIng, addCustomIng, openChat, chefDish, setChefDish, chefPersons, setChefPersons, chefSuggIdx, setChefSuggIdx }) {
      return (
        <div style={s.screen}>
          <div style={s.header}>
            <div style={s.headerLeft}>
              <span style={{...s.headerEmoji, animation:"float 3s ease-in-out infinite"}}>👨‍🍳</span>
              <div>
                <h1 style={s.headerTitle}>ChefIA</h1>
                <p style={s.headerSub}>Tu asistente de cocina personal</p>
              </div>
            </div>
          </div>

          <div style={s.tabBar}>
            {[
              { id:"ingredientes", label:"🛒 Ingredientes" },
              { id:"ideas",        label:"💡 Ideas" },
              { id:"chef",         label:"⭐ Chef Premium" },
            ].map(tab => (
              <button key={tab.id}
                style={{ ...s.tab, ...(activeTab===tab.id ? s.tabActive : {}) }}
                onClick={() => setActiveTab(tab.id)}>
                {tab.label}
              </button>
            ))}
          </div>

          {activeTab === "ingredientes" && (
            <IngredientesTab
              ingredients={ingredients} ingInput={ingInput} setIngInput={setIngInput}
              addIng={addIng} removeIng={removeIng} addCustomIng={addCustomIng}
              openChat={openChat}
            />
          )}
          {activeTab === "ideas" && <IdeasTab openChat={openChat} />}
          {activeTab === "chef" && (
            <ChefTab
              chefDish={chefDish} setChefDish={setChefDish}
              chefPersons={chefPersons} setChefPersons={setChefPersons}
              chefSuggIdx={chefSuggIdx} setChefSuggIdx={setChefSuggIdx}
              openChat={openChat}
            />
          )}
        </div>
      );
    }

    // ── INGREDIENTES TAB ──────────────────────────────────────────────────────────
    function IngredientesTab({ ingredients, ingInput, setIngInput, addIng, removeIng, addCustomIng, openChat }) {
      return (
        <div style={s.tabContent}>
          <div style={s.section}>
            <p style={s.sectionLabel}>¿Qué tienes en casa?</p>
            <div style={s.inputRow}>
              <input style={s.textInput} value={ingInput} onChange={e=>setIngInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addCustomIng()} placeholder="Escribe un ingrediente..." maxLength={30} />
              <button style={s.addBtn} onClick={addCustomIng}>+</button>
            </div>
            <div style={s.chipsWrap}>
              {suggestedIngredients.map(ing => (
                <button key={ing}
                  style={{ ...s.chip, ...(ingredients.includes(ing) ? s.chipActive : {}) }}
                  onClick={() => ingredients.includes(ing) ? removeIng(ing) : addIng(ing)}>
                  {ingredients.includes(ing) ? "✓ " : ""}{ing}
                </button>
              ))}
            </div>
          </div>

          {ingredients.length > 0 && (
            <div style={s.section}>
              <p style={s.sectionLabel}>Mis ingredientes ({ingredients.length}) 🥘</p>
              <div style={s.selectedWrap}>
                {ingredients.map(ing => (
                  <div key={ing} style={s.selectedChip}>
                    <span style={s.selectedText}>{ing}</span>
                    <button style={s.removeBtn} onClick={()=>removeIng(ing)}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={s.ctaBox}>
            <button
              style={{ ...s.ctaBtn, ...(ingredients.length===0 ? s.ctaDisabled : {}) }}
              onClick={() => ingredients.length > 0 && openChat(
                `Tengo estos ingredientes: ${ingredients.join(", ")}. ¿Qué puedo cocinar?`,
                "Con mis ingredientes", "ingredientes"
              )}
              disabled={ingredients.length===0}>
              {ingredients.length===0 ? "Agrega ingredientes primero" : "¿Qué puedo cocinar? 🍽️"}
            </button>
            {ingredients.length===0 && <p style={s.hintText}>Selecciona al menos un ingrediente</p>}
          </div>
        </div>
      );
    }

    // ── IDEAS TAB ─────────────────────────────────────────────────────────────────
    function IdeasTab({ openChat }) {
      return (
        <div style={s.tabContent}>
          <div style={s.section}>
            <p style={s.sectionLabel}>¿Qué se te antoja? 😋</p>
            <p style={s.sectionHint}>Toca una categoría y ChefIA te da ideas con instrucciones paso a paso</p>
          </div>
          <div style={s.catGrid}>
            {mealCategories.map(cat => (
              <button key={cat.id}
                style={{ ...s.catCard, background: cat.color }}
                onClick={() => openChat(cat.prompt, cat.label, "ideas")}>
                <span style={s.catEmoji}>{cat.emoji}</span>
                <span style={s.catLabel}>{cat.label}</span>
              </button>
            ))}
          </div>
          <div style={s.infoBox}>
            <p style={s.infoTitle}>🎲 ¿Sin idea?</p>
            <p style={s.infoText}>Toca cualquier categoría y ChefIA te sorprende con opciones deliciosas y fáciles de preparar</p>
          </div>
        </div>
      );
    }

    // ── CHEF PREMIUM TAB ──────────────────────────────────────────────────────────
    function ChefTab({ chefDish, setChefDish, chefPersons, setChefPersons, chefSuggIdx, setChefSuggIdx, openChat }) {
      const persons = ["1","2","4","6","8","10","12","15","20"];

      const handleAsk = () => {
        if (!chefDish.trim()) return;
        const p = parseInt(chefPersons) || 4;
        const msg = `Quiero la receta de chef premium de: ${chefDish}. Para ${p} persona${p>1?"s":""} por favor. Dame ingredientes exactos, costo estimado en pesos mexicanos, técnica profesional paso a paso y todos los secretos del chef.`;
        openChat(msg, `Chef: ${chefDish}`, "chef");
      };

      const nextSugg = () => setChefSuggIdx(i => (i+1) % chefSuggestions.length);
      const prevSugg = () => setChefSuggIdx(i => (i-1+chefSuggestions.length) % chefSuggestions.length);

      return (
        <div style={s.tabContent}>
          <div style={s.chefHero}>
            <div style={s.chefHeroOverlay}/>
            <div style={s.chefHeroContent}>
              <span style={s.chefHeroEmoji}>👨‍🍳</span>
              <h2 style={s.chefHeroTitle}>Chef Premium</h2>
              <p style={s.chefHeroSub}>Recetas profesionales con técnica de chef, ingredientes exactos y costo estimado</p>
            </div>
          </div>

          <div style={s.section}>
            <p style={s.sectionLabel}>¿Qué platillo quieres preparar? 🍽️</p>
            <input
              style={s.chefInput}
              value={chefDish}
              onChange={e=>setChefDish(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleAsk()}
              placeholder="Ej. Enchiladas verdes, Chimichurri..."
            />

            <div style={s.suggRow}>
              <button style={s.suggArrow} onClick={prevSugg}>‹</button>
              <div style={s.suggCenter}>
                <p style={s.suggLabel}>Sugerencias 👇</p>
                <button style={s.suggChip} onClick={()=>setChefDish(chefSuggestions[chefSuggIdx])}>
                  {chefSuggestions[chefSuggIdx]}
                </button>
                <button style={s.suggChip2} onClick={()=>setChefDish(chefSuggestions[(chefSuggIdx+1)%chefSuggestions.length])}>
                  {chefSuggestions[(chefSuggIdx+1)%chefSuggestions.length]}
                </button>
              </div>
              <button style={s.suggArrow} onClick={nextSugg}>›</button>
            </div>

            <p style={s.sectionLabel}>¿Para cuántas personas? 👥</p>
            <div style={s.personsRow}>
              {persons.map(n => (
                <button key={n}
                  style={{ ...s.personBtn, ...(chefPersons===n ? s.personBtnActive : {}) }}
                  onClick={()=>setChefPersons(n)}>
                  {n}
                </button>
              ))}
            </div>
            <p style={s.personsHint}>ChefIA calculará los ingredientes y costos exactos para {chefPersons} {parseInt(chefPersons)===1?"persona":"personas"}</p>

            <div style={s.badgeRow}>
              {["🛒 Ingredientes exactos","💰 Costo estimado MXN","👨‍🍳 Técnica profesional","🌟 Secretos del chef"].map(b=>(
                <div key={b} style={s.badge}>{b}</div>
              ))}
            </div>

            <button
              style={{ ...s.ctaBtn, ...((!chefDish.trim()) ? s.ctaDisabled : s.ctaChef) }}
              onClick={handleAsk}
              disabled={!chefDish.trim()}>
              {chefDish.trim() ? `👨‍🍳 Obtener receta para ${chefPersons} personas` : "Escribe un platillo primero"}
            </button>
          </div>
        </div>
      );
    }

    // ── CHAT VIEW ─────────────────────────────────────────────────────────────────
    function ChatView({ messages, loading, onSend, onBack, chatTitle, chatMode, chatEndRef }) {
      const [input, setInput] = useState("");

      const quickByMode = {
        ingredientes: ["Dame otra receta","¿Cómo se hace?","Más fácil","¿Cuánto tiempo?"],
        ideas:        ["Dame otra opción","¿Cómo se prepara?","Algo más rápido","Con menos ingredientes"],
        chef:         ["¿Cómo guardo sobrantes?","Versión más económica","¿Puedo sustituir algo?","Dame los secretos del chef"],
      };
      const quickReplies = quickByMode[chatMode] || quickByMode.ingredientes;
      const modeColors = { ingredientes: colors.primary, ideas: "#7B4FBF", chef: "#C4501F" };
      const modeColor = modeColors[chatMode] || colors.primary;
      const send = () => { if(!input.trim()) return; onSend(input); setInput(""); };

      return (
        <div style={s.chatScreen}>
          <div style={{ ...s.chatHeader, borderBottomColor: modeColor+"33" }}>
            <button style={s.backBtn} onClick={onBack}>← Volver</button>
            <div style={s.chatHeaderMid}>
              <div style={{ ...s.chatAva, background: modeColor }}>
                {chatMode==="chef" ? "⭐" : "👨‍🍳"}
              </div>
              <div>
                <p style={s.chatName}>{chatMode==="chef" ? "Chef Premium" : "ChefIA"}</p>
                <p style={s.chatSub}>{chatTitle}</p>
              </div>
            </div>
            <div style={{width:64}}/>
          </div>

          <div style={s.msgList}>
            {messages.map((m,i) => (
              <div key={i} style={m.role==="user" ? s.userRow : s.aiRow}>
                {m.role==="assistant" && (
                  <div style={{ ...s.aiAva, background: modeColor }}>
                    {chatMode==="chef" ? "⭐" : "👨‍🍳"}
                  </div>
                )}
                <div style={m.role==="user" ? {...s.userBubble, background:modeColor} : s.aiBubble}>
                  <p style={s.bubbleText}>{m.content}</p>
                </div>
              </div>
            ))}
            {loading && (
              <div style={s.aiRow}>
                <div style={{ ...s.aiAva, background: modeColor }}>
                  {chatMode==="chef" ? "⭐" : "👨‍🍳"}
                </div>
                <div style={s.aiBubble}>
                  <div style={{display:"flex",gap:4}}>
                    <span className="dot" style={{color:modeColor}}>●</span>
                    <span className="dot" style={{color:modeColor,animationDelay:".2s"}}>●</span>
                    <span className="dot" style={{color:modeColor,animationDelay:".4s"}}>●</span>
                  </div>
                </div>
              </div>
            )}
            <div ref={chatEndRef}/>
          </div>

          <div style={s.quickRow}>
            {quickReplies.map(q=>(
              <button key={q} style={{ ...s.quickReply, borderColor: modeColor+"55", color: modeColor }}
                onClick={()=>{ onSend(q); }}>
                {q}
              </button>
            ))}
          </div>

          <div style={s.inputBar}>
            <input style={s.chatInput} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Escribe tu pregunta..." />
            <button style={{ ...s.sendBtn, background:modeColor }} onClick={send}>➤</button>
          </div>
          <div style={{height:8, background:"#FFF8F0"}}/>
        </div>
      );
    }

    // ── RENDER ────────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ChefApp />);

    // ── SERVICE WORKER ────────────────────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
